<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>glue — og</title>
  <style>
    :root {
      --ink: #0f172a;
      --ink-soft: #475569;
      --ink-muted: #94a3b8;
      --line: #e2e8f0;
      --line-soft: #f1f5f9;
      --paper: #ffffff;
      --accent: #6d28d9;
      --accent-soft: #ede9fe;
      --accent-strong: #5b21b6;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      width: 1200px;
      height: 630px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Inter", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background: var(--paper);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }
    .card {
      width: 100%;
      height: 100%;
      padding: 72px 80px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      position: relative;
    }
    .corner {
      position: absolute;
      top: 0;
      right: 0;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle at 100% 0%, var(--accent-soft) 0%, transparent 60%);
      pointer-events: none;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
    }
    h1 {
      font-size: 84px;
      line-height: 1.05;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 32px 0 24px;
      color: var(--ink);
    }
    h1 .accent { color: var(--accent); }
    p.lede {
      font-size: 28px;
      line-height: 1.4;
      color: var(--ink-soft);
      max-width: 900px;
      margin: 0;
    }
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 20px;
      color: var(--ink-muted);
    }
    .footer .brand {
      color: var(--ink);
      font-weight: 600;
    }
    .footer .stack {
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="corner"></div>
    <div>
      <div class="chip"><span class="dot"></span>Open source · Go · MIT</div>
      <h1>Agent = Provider + Loop + Tools.<br><span class="accent">In Go.</span></h1>
      <p class="lede">
        A small, provider-agnostic agent harness — and the reference
        agents built on it.
      </p>
    </div>
    <div></div>
    <div class="footer">
      <div class="brand">glue</div>
      <div class="stack">Codex · Gemini · NVIDIA · OpenRouter · MCP · sqlite + FTS5</div>
    </div>
  </div>
</body>
</html>
